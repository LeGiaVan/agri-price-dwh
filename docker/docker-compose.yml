services:
  ingest:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agri_ingest
    env_file: ../.env
    volumes:
      - ../logs:/app/logs
      - ../ingest:/app/ingest
    command: python ingest/fao_ingest.py
    networks:
      - agri_net

  fao_bronze_seed:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agri_fao_bronze_seed
    env_file: ../.env
    volumes:
      - ../fao_bronze_seed.py:/app/fao_bronze_seed.py
      - ../logs:/app/logs
    command: python fao_bronze_seed.py
    networks:
      - agri_net

  dbt:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agri_dbt
    env_file: ../.env
    volumes:
      - ../dbt:/app/dbt
      - ../logs:/app/logs
    working_dir: /app/dbt
    command: dbt run --profiles-dir .
    networks:
      - agri_net

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: agri_dashboard
    env_file: ../.env
    ports:
      - "8501:8501"
    volumes:
      - ../dashboard:/app/dashboard
    working_dir: /app/dashboard
    command: >
      streamlit run app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    networks:
      - agri_net
    depends_on:
      - ingest

networks:
  agri_net:
    driver: bridge
