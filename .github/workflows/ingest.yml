name: Monthly Ingest

on:
  push:
    branches:
      - dev
  schedule:
    - cron:
  push:
    branches:
      - dev '0 17 1 * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on:
  push:
    branches:
      - dev ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version:
  push:
    branches:
      - dev '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ingest/requirements.txt

      - name: Run Monthly Incremental Ingestion
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python ingest/daily_cron.py

      - name: Run dbt seed and build
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          dbt seed --project-dir dbt --profiles-dir dbt
          dbt build --project-dir dbt --profiles-dir dbt

      - name: Upload ingest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-logs
          path: logs/
          if-no-files-found: ignore
