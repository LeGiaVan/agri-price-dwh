name: Daily Ingest

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run FAO ingest
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python ingest/fao_ingest.py

      - name: Run World Bank ingest
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: python ingest/worldbank_ingest.py

      - name: Upload ingest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-logs
          path: logs/
          if-no-files-found: ignore
